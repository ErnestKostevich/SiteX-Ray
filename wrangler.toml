# Wrangler config for local dev and Cloudflare deployment.
# This is OPTIONAL — Cloudflare Pages works without it once you connect
# the GitHub repo via the dashboard (see DEPLOY.md step 3).
#
# Useful if you want to run the backend locally before deploying:
#   1. npm install -g wrangler
#   2. wrangler login                       (opens browser)
#   3. cp .dev.vars.example .dev.vars       (then paste your real keys)
#   4. wrangler pages dev landing           (serves http://localhost:8788)

name = "sitexray"
compatibility_date = "2025-01-01"
pages_build_output_dir = "landing"

# Cloudflare Workers AI binding — gives the worker access to free Llama 3.1
# inference. This is what makes free teasers cost $0 for the founder.
# Free plan: 10,000 Neurons/day (≈50–200 audits/day).
[ai]
binding = "AI"

# Cloudflare Email Service — sends audit reports (replaces Resend).
# Domain must be onboarded: wrangler email sending enable sitexray.xyz
# remote = true lets local `wrangler pages dev` send real emails.
[[send_email]]
name = "EMAIL"
remote = true

# When deploying via wrangler directly (instead of GitHub auto-deploy):
#   wrangler pages deploy landing --project-name=sitexray
