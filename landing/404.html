<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — SiteX-Ray</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Inter", system-ui, sans-serif; color: #f3eeff;
    background: #08050f; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(139,92,246,0.15), transparent);
  }
  .card {
    width: 100%; max-width: 400px; text-align: center;
    background: #110a1c; border: 1px solid rgba(167,139,250,0.14);
    border-radius: 14px; padding: 36px 28px;
  }
  .code { font-size: 48px; font-weight: 700; color: #a78bfa; letter-spacing: -0.04em; margin-bottom: 12px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  p { color: #7c6b9e; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  .btn {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 11px 20px; border-radius: 9px;
    font-weight: 600; font-size: 14px; text-decoration: none; margin-bottom: 10px;
  }
  .btn-primary { background: linear-gradient(135deg, #7c3aed, #8b5cf6); color: #fff; }
  .btn-ghost { color: #f3eeff; border: 1px solid rgba(167,139,250,0.2); }
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This URL doesn't exist. Run a free audit from the homepage.</p>
  <a href="/" class="btn btn-primary">Back to home</a>
  <a href="/sample-report.html" class="btn btn-ghost">View sample report</a>
</div>
</body>
</html>
